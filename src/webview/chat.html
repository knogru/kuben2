<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src ${cspSource} 'unsafe-inline'; script-src 'nonce-${nonce}';">
  <title>Kuben AI Chat</title>
  <style>
    body {
      background-color: var(--vscode-editor-background, #1e1e1e);
      color: var(--vscode-editor-foreground, #d4d4d4);
      font-family: var(--vscode-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif);
      font-size: var(--vscode-font-size, 13px);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
    }

    /* Container de Mensagens */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Bolhas de Mensagem */
    .message {
      max-width: 90%;
      padding: 8px 12px;
      border-radius: 8px;
      line-height: 1.4;
      word-wrap: break-word;
      animation: fadeIn 0.2s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .user {
      align-self: flex-end;
      background-color: var(--vscode-button-background, #0e639c);
      color: var(--vscode-button-foreground, #ffffff);
    }

    .assistant {
      align-self: flex-start;
      background-color: var(--vscode-editorWidget-background, #252526);
      border: 1px solid var(--vscode-widget-border, #303031);
      color: var(--vscode-editorWidget-foreground, #cccccc);
    }

    /* Caixa de entrada */
    #input-container {
      padding: 8px 12px;
      background-color: var(--vscode-editorWidget-background, #252526);
      border-top: 1px solid var(--vscode-widget-border, #303031);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #textarea-wrapper {
      display: flex;
      gap: 6px;
    }

    textarea {
      flex: 1;
      height: 48px;
      resize: none;
      background-color: var(--vscode-input-background, #3c3c3c);
      color: var(--vscode-input-foreground, #cccccc);
      border: 1px solid var(--vscode-input-border, #3c3c3c);
      border-radius: 4px;
      padding: 6px 8px;
      font-family: inherit;
      font-size: inherit;
      outline: none;
    }

    textarea:focus {
      border-color: var(--vscode-focusBorder, #007fd4);
    }

    button {
      background-color: var(--vscode-button-background, #0e639c);
      color: var(--vscode-button-foreground, #ffffff);
      border: none;
      border-radius: 4px;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 600;
      transition: background-color 0.1s ease;
    }

    button:hover {
      background-color: var(--vscode-button-hoverBackground, #1177bb);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Atalhos de Comandos Rápidos */
    #shortcuts {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .shortcut-btn {
      background-color: var(--vscode-input-background, #3c3c3c);
      color: var(--vscode-input-foreground, #cccccc);
      border: 1px solid var(--vscode-widget-border, #303031);
      padding: 3px 8px;
      font-size: 11px;
      border-radius: 3px;
      cursor: pointer;
    }

    .shortcut-btn:hover {
      background-color: var(--vscode-button-background, #0e639c);
      color: var(--vscode-button-foreground, #ffffff);
    }

    .shortcut-btn.active {
      background-color: var(--vscode-button-background, #0e639c);
      color: var(--vscode-button-foreground, #ffffff);
      border-color: var(--vscode-focusBorder, #007fd4);
      font-weight: bold;
    }

    /* Blocos de Código em Markdown */
    pre {
      background-color: rgba(0, 0, 0, 0.25);
      padding: 8px;
      border-radius: 4px;
      overflow-x: auto;
      margin: 6px 0;
      position: relative;
    }

    code {
      font-family: var(--vscode-editor-font-family, Consolas, Monaco, monospace);
      font-size: 12px;
    }

    .copy-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      padding: 2px 6px;
      font-size: 10px;
      background: var(--vscode-input-background, #3c3c3c);
      border: 1px solid var(--vscode-widget-border, #303031);
      border-radius: 3px;
      color: var(--vscode-input-foreground, #cccccc);
      cursor: pointer;
    }

    .copy-btn:hover {
      background: var(--vscode-button-background, #0e639c);
      color: var(--vscode-button-foreground, #ffffff);
    }
  </style>
</head>
<body>
  <div id="chat-container">
    <div class="message assistant">
      Olá! Eu sou o Kuben. Como posso ajudar você com o seu código hoje?
    </div>
  </div>

  <div id="input-container">
    <div id="shortcuts">
      <button class="shortcut-btn" data-command="/explain">/explain</button>
      <button class="shortcut-btn" data-command="/fix">/fix</button>
      <button class="shortcut-btn" data-command="/test">/test</button>
      <button class="shortcut-btn" data-command="/doc">/doc</button>
    </div>
    <div id="textarea-wrapper">
      <textarea id="prompt" placeholder="Pergunte ao Kuben... (Ctrl+Enter para enviar)"></textarea>
      <button id="send-btn">Enviar</button>
    </div>
  </div>

  <script nonce="${nonce}">
    const vscode = acquireVsCodeApi();
    const chatContainer = document.getElementById('chat-container');
    const promptInput = document.getElementById('prompt');
    const sendButton = document.getElementById('send-btn');
    let currentAssistantMessageDiv = null;
    let currentMode = 'chat'; // 'chat', '/explain', '/fix', '/test', '/doc'

    // Configurar event listeners programaticamente para respeitar a CSP e gerenciar os modos
    document.querySelectorAll('.shortcut-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const cmd = btn.getAttribute('data-command');
        
        if (currentMode === cmd) {
          // Desmarcar o modo atual se clicado novamente e voltar para chat
          currentMode = 'chat';
          btn.classList.remove('active');
          promptInput.placeholder = 'Pergunte ao Kuben... (Ctrl+Enter para enviar)';
        } else {
          // Limpar estados ativos anteriores
          document.querySelectorAll('.shortcut-btn').forEach(b => b.classList.remove('active'));
          // Ativar novo modo
          currentMode = cmd;
          btn.classList.add('active');
          
          let placeholderText = 'Pergunte ao Kuben...';
          if (cmd === '/explain') placeholderText = 'Explicar código ativo... (Digite detalhes ou clique em Enviar)';
          else if (cmd === '/fix') placeholderText = 'Corrigir erros no código ativo... (Digite detalhes ou clique em Enviar)';
          else if (cmd === '/test') placeholderText = 'Gerar testes para o código ativo... (Digite detalhes ou clique em Enviar)';
          else if (cmd === '/doc') placeholderText = 'Documentar código ativo... (Digite detalhes ou clique em Enviar)';
          
          promptInput.placeholder = placeholderText;
        }
      });
    });

    sendButton.addEventListener('click', () => {
      sendMessage();
    });

    // Atalho Ctrl+Enter para enviar
    promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Ouvinte delegado para cliques nos botões de copiar do chat (evita bloqueio da CSP)
    chatContainer.addEventListener('click', (e) => {
      if (e.target && e.target.classList.contains('copy-btn')) {
        const codeId = e.target.getAttribute('data-code-id');
        if (codeId) {
          copyToClipboard(codeId, e.target);
        }
      }
    });

    function sendMessage() {
      const text = promptInput.value.trim();
      
      // Permitir enviar sem prompt caso estejamos em algum modo de atalho para atuar no código ativo
      if (!text && currentMode === 'chat') return;

      const displayPrompt = text || `Executar modo ${currentMode} no código do editor`;

      // Adicionar mensagem do usuário na tela
      appendMessage('user', displayPrompt);
      promptInput.value = '';
      promptInput.disabled = true;
      sendButton.disabled = true;

      // Criar espaço para a resposta do assistente
      currentAssistantMessageDiv = appendMessage('assistant', 'Pensando...');

      // Notificar extensão com o texto e o modo
      vscode.postMessage({ type: 'chat', text: text, mode: currentMode });
    }

    function appendMessage(sender, text) {
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      div.innerHTML = formatMarkdown(text);
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return div;
    }

    // Escutar mensagens vindas da extensão principal
    window.addEventListener('message', event => {
      const message = event.data;
      switch (message.type) {
        case 'clear':
          chatContainer.innerHTML = '';
          currentAssistantMessageDiv = null;
          // Voltar ao modo chat geral
          currentMode = 'chat';
          document.querySelectorAll('.shortcut-btn').forEach(b => b.classList.remove('active'));
          promptInput.placeholder = 'Pergunte ao Kuben... (Ctrl+Enter para enviar)';
          break;
        case 'chunk':
          if (currentAssistantMessageDiv) {
            if (currentAssistantMessageDiv.innerHTML === 'Pensando...') {
              currentAssistantMessageDiv.innerHTML = '';
            }
            // Concatenar e renderizar markdown
            currentAssistantMessageDiv.accumulatedText = (currentAssistantMessageDiv.accumulatedText || '') + message.text;
            currentAssistantMessageDiv.innerHTML = formatMarkdown(currentAssistantMessageDiv.accumulatedText);
            chatContainer.scrollTop = chatContainer.scrollHeight;
          }
          break;
        case 'done':
          promptInput.disabled = false;
          sendButton.disabled = false;
          promptInput.focus();
          currentAssistantMessageDiv = null;
          break;
        case 'error':
          if (currentAssistantMessageDiv) {
            currentAssistantMessageDiv.innerHTML = `<span style="color: var(--vscode-editorError-foreground, #f14c4c)">Erro na geração: ${message.text}</span>`;
          }
          promptInput.disabled = false;
          sendButton.disabled = false;
          break;
      }
    });

    // Renderizador Markdown extremamente básico e robusto
    function formatMarkdown(text) {
      if (!text) return '';
      let html = text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");

      // Renderizar blocos de código: ```lang ... ```
      html = html.replace(/```([\w-]*)\n([\s\S]*?)```/g, (match, lang, code) => {
        const id = 'code-' + Math.random().toString(36).substr(2, 9);
        return `<pre><button class="copy-btn" data-code-id="${id}">Copiar</button><code id="${id}">${code.trim()}</code></pre>`;
      });

      // Renderizar códigos inline: `code`
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

      // Quebras de linha
      html = html.replace(/\n/g, '<br>');

      return html;
    }

    function copyToClipboard(id, btn) {
      const codeEl = document.getElementById(id);
      if (codeEl) {
        const text = codeEl.innerText;
        navigator.clipboard.writeText(text).then(() => {
          btn.innerText = 'Copiado!';
          setTimeout(() => btn.innerText = 'Copiar', 2000);
        });
      }
    }
  </script>
</body>
</html>
