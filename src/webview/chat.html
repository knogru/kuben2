<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src ${cspSource} 'unsafe-inline'; script-src 'nonce-${nonce}' ${cspSource};">
  <script src="${markedUri}"></script>
  <script src="${purifyUri}"></script>
  <title>Kuben AI</title>
  <style>
    body {
      background-color: var(--vscode-editor-background, #1e1e1e);
      color: var(--vscode-editor-foreground, #d4d4d4);
      font-family: var(--vscode-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif);
      font-size: var(--vscode-font-size, 13px);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--vscode-widget-border, #303031);
      background-color: var(--vscode-editorWidget-background, #252526);
    }
    .tab {
      padding: 10px 16px;
      cursor: pointer;
      opacity: 0.6;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .tab:hover { opacity: 0.9; }
    .tab.active {
      opacity: 1;
      border-bottom: 2px solid var(--vscode-focusBorder, #007fd4);
      color: var(--vscode-focusBorder, #007fd4);
    }

    /* Views */
    .view {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
    }
    .view.active {
      display: flex;
    }

    /* Chat Container */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 90%;
      padding: 8px 12px;
      border-radius: 8px;
      line-height: 1.4;
      word-wrap: break-word;
      animation: fadeIn 0.2s ease-out;
      position: relative;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .user {
      align-self: flex-end;
      background-color: var(--vscode-button-background, #0e639c);
      color: var(--vscode-button-foreground, #ffffff);
    }
    .assistant {
      align-self: flex-start;
      background-color: var(--vscode-editorWidget-background, #252526);
      border: 1px solid var(--vscode-widget-border, #303031);
      color: var(--vscode-editorWidget-foreground, #cccccc);
    }

    /* Input area */
    #input-container {
      padding: 8px 12px;
      background-color: var(--vscode-editorWidget-background, #252526);
      border-top: 1px solid var(--vscode-widget-border, #303031);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #textarea-wrapper {
      display: flex;
      gap: 6px;
    }
    textarea {
      flex: 1;
      height: 48px;
      resize: none;
      background-color: var(--vscode-input-background, #3c3c3c);
      color: var(--vscode-input-foreground, #cccccc);
      border: 1px solid var(--vscode-input-border, #3c3c3c);
      border-radius: 4px;
      padding: 6px 8px;
      font-family: inherit;
      outline: none;
    }
    textarea:focus { border-color: var(--vscode-focusBorder, #007fd4); }
    button {
      background-color: var(--vscode-button-background, #0e639c);
      color: var(--vscode-button-foreground, #ffffff);
      border: none;
      border-radius: 4px;
      padding: 6px 14px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background-color: var(--vscode-button-hoverBackground, #1177bb); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Shortcuts */
    #shortcuts { display: flex; gap: 6px; flex-wrap: wrap; }
    .shortcut-btn {
      background-color: var(--vscode-input-background, #3c3c3c);
      color: var(--vscode-input-foreground, #cccccc);
      border: 1px solid var(--vscode-widget-border, #303031);
      padding: 3px 8px; font-size: 11px; border-radius: 3px; cursor: pointer;
    }
    .shortcut-btn:hover, .shortcut-btn.active {
      background-color: var(--vscode-button-background, #0e639c);
      color: var(--vscode-button-foreground, #ffffff);
    }
    .shortcut-btn.active { font-weight: bold; border-color: var(--vscode-focusBorder); }

    /* Markdown elements */
    pre {
      background-color: rgba(0,0,0,0.25);
      padding: 8px; border-radius: 4px;
      overflow-x: auto; margin: 6px 0; position: relative;
    }
    code { font-family: var(--vscode-editor-font-family, Consolas, Monaco, monospace); font-size: 12px; }
    .copy-btn {
      position: absolute; top: 4px; right: 4px; padding: 2px 6px; font-size: 10px;
      background: var(--vscode-input-background); border: 1px solid var(--vscode-widget-border);
      border-radius: 3px; cursor: pointer;
    }
    .copy-btn:hover { background: var(--vscode-button-background); color: var(--vscode-button-foreground); }

    .message-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px; }
    .msg-action-btn { background: none; border: none; color: var(--vscode-textLink-foreground, #3794ff); cursor: pointer; font-size: 11px; padding: 0; opacity: 0.7; }
    .msg-action-btn:hover { opacity: 1; text-decoration: underline; }

    /* Settings UI */
    #settings-view {
      padding: 16px;
      overflow-y: auto;
    }
    .settings-form { display: flex; flex-direction: column; gap: 16px; }
    .settings-group { display: flex; flex-direction: column; gap: 6px; }
    .settings-group label { font-weight: 600; font-size: 12px; }
    .settings-group input, .settings-group select {
      padding: 8px;
      background-color: var(--vscode-input-background, #3c3c3c);
      color: var(--vscode-input-foreground, #cccccc);
      border: 1px solid var(--vscode-input-border, #3c3c3c);
      border-radius: 4px;
      outline: none;
    }
    .settings-group input:focus, .settings-group select:focus {
      border-color: var(--vscode-focusBorder, #007fd4);
    }
    .status-msg { margin-top: 8px; font-size: 12px; color: var(--vscode-notificationsInfoIcon-foreground); }
  </style>
</head>
<body>
  <div class="tabs">
    <div class="tab active" data-target="chat-view">Chat</div>
    <div class="tab" data-target="settings-view">Settings</div>
  </div>

  <div id="chat-view" class="view active">
    <div id="chat-container">
    </div>
    <div id="input-container">
      <div id="shortcuts">
        <button class="shortcut-btn" data-command="/explain">/explain</button>
        <button class="shortcut-btn" data-command="/fix">/fix</button>
        <button class="shortcut-btn" data-command="/test">/test</button>
        <button class="shortcut-btn" data-command="/doc">/doc</button>
      </div>
      <div id="textarea-wrapper">
        <textarea id="prompt" placeholder="Pergunte ao Kuben... (Ctrl+Enter para enviar)"></textarea>
        <button id="send-btn">Enviar</button>
      </div>
    </div>
  </div>

  <div id="settings-view" class="view">
    <div class="settings-form">
      <div class="settings-group">
        <label>Provedor de Modelos</label>
        <select id="setting-provider">
          <option value="ollama">Ollama (Local)</option>
          <option value="openai">OpenAI Compatible (LM Studio, LiteLLM, vLLM)</option>
        </select>
      </div>
      <div class="settings-group">
        <label>Base URL</label>
        <input type="text" id="setting-url" placeholder="http://localhost:11434">
      </div>
      <div class="settings-group">
        <label>API Key (Opcional)</label>
        <input type="password" id="setting-apikey" placeholder="Sua chave aqui">
      </div>
      <button id="btn-fetch-models">Carregar Modelos Disponíveis</button>
      <div id="fetch-status" class="status-msg"></div>
      
      <div class="settings-group">
        <label>Modelo para Autocomplete (FIM)</label>
        <select id="setting-model"></select>
      </div>
      <div class="settings-group">
        <label>Modelo para Chat</label>
        <select id="setting-chatmodel"></select>
      </div>
      
      <button id="btn-save-settings">Salvar Configurações</button>
      <div id="save-status" class="status-msg"></div>
    </div>
  </div>

  <script nonce="${nonce}">
    const vscode = acquireVsCodeApi();

    // --- TABS LOGIC ---
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.getAttribute('data-target')).classList.add('active');
      });
    });

    // --- CHAT LOGIC ---
    const chatContainer = document.getElementById('chat-container');
    const promptInput = document.getElementById('prompt');
    const sendButton = document.getElementById('send-btn');
    let currentAssistantMessageDiv = null;
    let currentMode = 'chat'; 

    document.querySelectorAll('.shortcut-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const cmd = btn.getAttribute('data-command');
        if (currentMode === cmd) {
          currentMode = 'chat';
          btn.classList.remove('active');
          promptInput.placeholder = 'Pergunte ao Kuben... (Ctrl+Enter para enviar)';
        } else {
          document.querySelectorAll('.shortcut-btn').forEach(b => b.classList.remove('active'));
          currentMode = cmd;
          btn.classList.add('active');
          promptInput.placeholder = 'Digite detalhes ou clique em Enviar...';
        }
      });
    });

    sendButton.addEventListener('click', () => sendMessage());
    promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    chatContainer.addEventListener('click', (e) => {
      if (e.target && e.target.classList.contains('copy-btn')) {
        const codeId = e.target.getAttribute('data-code-id');
        if (codeId) copyToClipboard(codeId, e.target);
      }
    });

    function sendMessage() {
      const text = promptInput.value.trim();
      if (!text && currentMode === 'chat') return;
      const displayPrompt = text || `Executar modo ${currentMode} no código do editor`;
      appendMessage('user', displayPrompt);
      promptInput.value = ''; promptInput.disabled = true; sendButton.disabled = true;
      currentAssistantMessageDiv = appendMessage('assistant', 'Pensando...');
      vscode.postMessage({ type: 'chat', text: text, mode: currentMode });
    }

    function appendMessage(sender, text) {
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      div.accumulatedText = text;

      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.innerHTML = formatMarkdown(text);
      div.appendChild(contentDiv);

      const footer = document.createElement('div');
      footer.className = 'message-footer';
      
      const copyBtn = document.createElement('button');
      copyBtn.className = 'msg-action-btn copy-msg-btn';
      copyBtn.innerText = 'Copiar';
      copyBtn.onclick = () => {
        navigator.clipboard.writeText(div.accumulatedText).then(() => {
          copyBtn.innerText = 'Copiado!';
          setTimeout(() => copyBtn.innerText = 'Copiar', 2000);
        });
      };
      footer.appendChild(copyBtn);

      if (sender === 'assistant') {
        const regenBtn = document.createElement('button');
        regenBtn.className = 'msg-action-btn regen-msg-btn';
        regenBtn.innerText = 'Refazer';
        regenBtn.onclick = () => {
          vscode.postMessage({ type: 'regenerate' });
        };
        footer.appendChild(regenBtn);
      }

      div.appendChild(footer);
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return div;
    }

    function formatMarkdown(text) {
      if (!text) return '';
      if (typeof marked === 'undefined') return text;
      
      const rawHtml = marked.parse(text);
      const safeHtml = typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(rawHtml) : rawHtml;
      
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = safeHtml;
      tempDiv.querySelectorAll('pre').forEach(pre => {
        const codeEl = pre.querySelector('code');
        if (codeEl) {
          const id = 'code-' + Math.random().toString(36).substr(2, 9);
          codeEl.id = id;
          const btn = document.createElement('button');
          btn.className = 'copy-btn';
          btn.setAttribute('data-code-id', id);
          btn.innerText = 'Copiar';
          pre.insertBefore(btn, codeEl);
        }
      });
      return tempDiv.innerHTML;
    }

    function copyToClipboard(id, btn) {
      const codeEl = document.getElementById(id);
      if (codeEl) navigator.clipboard.writeText(codeEl.innerText).then(() => {
        btn.innerText = 'Copiado!'; setTimeout(() => btn.innerText = 'Copiar', 2000);
      });
    }

    // --- SETTINGS LOGIC ---
    const pProvider = document.getElementById('setting-provider');
    const pUrl = document.getElementById('setting-url');
    const pApiKey = document.getElementById('setting-apikey');
    const pModel = document.getElementById('setting-model');
    const pChatModel = document.getElementById('setting-chatmodel');
    const btnFetch = document.getElementById('btn-fetch-models');
    const btnSave = document.getElementById('btn-save-settings');
    const fetchStatus = document.getElementById('fetch-status');
    const saveStatus = document.getElementById('save-status');

    pProvider.addEventListener('change', () => {
      if(pProvider.value === 'openai') {
        if(pUrl.value === 'http://localhost:11434') pUrl.value = 'http://localhost:1234/v1';
      } else {
        if(pUrl.value === 'http://localhost:1234/v1') pUrl.value = 'http://localhost:11434';
      }
    });

    btnFetch.addEventListener('click', () => {
      fetchStatus.innerText = 'Carregando modelos...';
      vscode.postMessage({
        type: 'fetchModels',
        provider: pProvider.value,
        url: pUrl.value,
        apiKey: pApiKey.value
      });
    });

    btnSave.addEventListener('click', () => {
      saveStatus.innerText = 'Salvando...';
      vscode.postMessage({
        type: 'saveSettings',
        provider: pProvider.value,
        url: pUrl.value,
        apiKey: pApiKey.value,
        model: pModel.value,
        chatModel: pChatModel.value
      });
    });

    // --- MESSAGE LISTENER FROM EXTENSION ---
    window.addEventListener('message', event => {
      const msg = event.data;
      switch (msg.type) {
        case 'chunk':
          if (currentAssistantMessageDiv) {
            const contentDiv = currentAssistantMessageDiv.querySelector('.message-content');
            if (contentDiv && contentDiv.innerHTML === 'Pensando...') contentDiv.innerHTML = '';
            currentAssistantMessageDiv.accumulatedText = (currentAssistantMessageDiv.accumulatedText || '') + msg.text;
            if (contentDiv) contentDiv.innerHTML = formatMarkdown(currentAssistantMessageDiv.accumulatedText);
            chatContainer.scrollTop = chatContainer.scrollHeight;
          }
          break;
        case 'done':
          promptInput.disabled = false; sendButton.disabled = false; promptInput.focus();
          currentAssistantMessageDiv = null;
          break;
        case 'error':
          if (currentAssistantMessageDiv) currentAssistantMessageDiv.innerHTML = `<span style="color: #f14c4c">Erro: ${msg.text}</span>`;
          promptInput.disabled = false; sendButton.disabled = false;
          break;
        case 'clear':
          chatContainer.innerHTML = ''; currentAssistantMessageDiv = null; currentMode = 'chat';
          document.querySelectorAll('.shortcut-btn').forEach(b => b.classList.remove('active'));
          break;
        case 'initSettings':
          // Populate current settings
          pProvider.value = msg.config.provider;
          pUrl.value = msg.config.endpoint;
          pApiKey.value = msg.config.apiKey;
          // Option creation helper
          const addOpt = (sel, val) => {
            const opt = document.createElement('option'); opt.value = val; opt.innerText = val; sel.appendChild(opt);
          };
          pModel.innerHTML = ''; pChatModel.innerHTML = '';
          addOpt(pModel, msg.config.model);
          addOpt(pChatModel, msg.config.chatModel);
          break;
        case 'modelsLoaded':
          fetchStatus.innerText = `Encontrados ${msg.models.length} modelos.`;
          pModel.innerHTML = ''; pChatModel.innerHTML = '';
          msg.models.forEach(m => {
            const opt1 = document.createElement('option'); opt1.value = m; opt1.innerText = m; pModel.appendChild(opt1);
            const opt2 = document.createElement('option'); opt2.value = m; opt2.innerText = m; pChatModel.appendChild(opt2);
          });
          break;
        case 'modelsError':
          fetchStatus.innerText = `Erro ao carregar: ${msg.error}`;
          break;
        case 'settingsSaved':
          saveStatus.innerText = 'Configurações salvas e aplicadas com sucesso!';
          setTimeout(() => saveStatus.innerText = '', 3000);
          break;
      }
    });

    // Ask extension for current settings on load
    vscode.postMessage({ type: 'getSettings' });

    // Init initial message
    setTimeout(() => {
      appendMessage('assistant', 'Olá! Eu sou o Kuben. Como posso ajudar você com o seu código hoje?');
    }, 100);
  </script>
</body>
</html>
